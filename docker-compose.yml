services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - neo4j
      - qdrant

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    command: python -m worker.main
    env_file:
      - .env.example
    depends_on:
      - redis
      - postgres
      - neo4j
      - qdrant

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: learn_it
      POSTGRES_PASSWORD: learn_it
      POSTGRES_DB: learn_it
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/learn_it_graph
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  neo4j_data:
  qdrant_data:
