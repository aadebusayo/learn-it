[project]
name = "learn-it-graph"
version = "0.1.0"
description = "Knowledge graph domain model for Learn It."
requires-python = ">=3.11"
dependencies = ["pydantic>=2.9.2"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["learning_graph"]
