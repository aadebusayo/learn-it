[project]
name = "learn-it-ingestion"
version = "0.1.0"
description = "Source parsing and concept extraction for Learn It."
requires-python = ">=3.11"
dependencies = ["pydantic>=2.9.2", "pypdf>=5.1.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["learning_ingestion"]
